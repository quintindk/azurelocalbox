# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: azure-localbox
metadata:
  template: azure-localbox@0.1.0
infra:
  provider: "bicep"
  path: "infra/bicep"
  module: "main.localbox"
hooks:
  preprovision:
    posix:
      shell: sh
      run: ./infra/hooks/preprovision.sh
      continueOnError: false
      interactive: true
  postprovision:
    posix:
      shell: sh
      run: ./infra/hooks/postprovision.sh
      continueOnError: false
      interactive: true
